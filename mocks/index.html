<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#f6f1e8" />
    <link rel="apple-touch-icon" href="../public/icons/apple-touch-icon.png" />
    <link rel="icon" href="../public/icons/icon-192.png" />
    <style>
:root {
  color: #211f1c;
  background: #f6f1e8;
  font-family:
    Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  font-synthesis: none;
  text-rendering: optimizeLegibility;
  -webkit-font-smoothing: antialiased;
  --surface: #fffaf0;
  --surface-strong: #ffffff;
  --ink-muted: #6a6258;
  --border: #ded4c6;
  --danger: #b54132;
  --green: #2f8f83;
  --blue: #3e6fb6;
  --shadow: 0 20px 60px rgb(47 40 32 / 12%);
}

* {
  box-sizing: border-box;
}

html {
  min-height: 100%;
  background: #f6f1e8;
}

body {
  min-width: 320px;
  min-height: 100dvh;
  margin: 0;
}

button,
input,
select {
  font: inherit;
}

button {
  -webkit-tap-highlight-color: transparent;
}

#root {
  min-height: 100dvh;
}

.app-shell,
.auth-screen,
.loading-screen {
  width: 100%;
  min-height: 100dvh;
  max-width: 520px;
  margin: 0 auto;
  background:
    linear-gradient(180deg, rgb(255 255 255 / 54%) 0%, rgb(255 255 255 / 0%) 34%),
    #f6f1e8;
}

.app-shell {
  display: flex;
  flex-direction: column;
  padding: max(18px, env(safe-area-inset-top)) 16px max(92px, env(safe-area-inset-bottom));
}

.top-bar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 16px;
  padding: 4px 0 18px;
}

.top-bar h1,
.brand-block h1 {
  margin: 0;
  font-size: clamp(2rem, 11vw, 3.4rem);
  line-height: 0.95;
  letter-spacing: 0;
}

.eyebrow {
  margin: 0 0 5px;
  color: #8d4a3d;
  font-size: 0.75rem;
  font-weight: 800;
  letter-spacing: 0.08em;
  text-transform: uppercase;
}

.top-actions {
  display: flex;
  gap: 8px;
}

.icon-button,
.tiny-icon-button {
  display: grid;
  place-items: center;
  width: 44px;
  height: 44px;
  border: 1px solid var(--border);
  border-radius: 8px;
  color: #211f1c;
  background: rgb(255 255 255 / 62%);
}

.tiny-icon-button {
  width: 36px;
  height: 36px;
  background: transparent;
}

.screen-content {
  flex: 1;
}

.stack {
  display: grid;
  gap: 16px;
}

.today-hero {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 18px;
  min-height: 132px;
  padding: 22px;
  border-radius: 8px;
  color: white;
  background:
    linear-gradient(135deg, rgb(33 31 28 / 90%), rgb(181 65 50 / 88%)),
    #211f1c;
  box-shadow: var(--shadow);
}

.today-hero span {
  display: block;
  font-size: clamp(4rem, 24vw, 7rem);
  font-weight: 900;
  line-height: 0.84;
}

.habit-list {
  display: grid;
  gap: 12px;
}

.habit-card {
  --habit-color: #ef6f56;
  display: grid;
  grid-template-columns: 1fr 54px;
  align-items: stretch;
  gap: 12px;
  min-height: 132px;
  padding: 14px;
  border: 1px solid var(--border);
  border-left: 7px solid var(--habit-color);
  border-radius: 8px;
  background: var(--surface-strong);
  box-shadow: 0 10px 30px rgb(47 40 32 / 7%);
}

.habit-card.done {
  border-left-color: var(--green);
}

.habit-card.overdue {
  background: #fff5f2;
  border-left-color: var(--danger);
}

.habit-main {
  display: flex;
  min-width: 0;
  gap: 12px;
}

.habit-icon {
  display: grid;
  flex: 0 0 44px;
  place-items: center;
  width: 44px;
  height: 44px;
  border-radius: 8px;
  color: white;
  background: var(--habit-color);
}

.habit-copy {
  min-width: 0;
}

.habit-title-row {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 8px;
}

.habit-card h2,
.status-panel h2 {
  margin: 0;
  font-size: 1.08rem;
  line-height: 1.15;
  letter-spacing: 0;
}

.habit-card p,
.status-panel p {
  margin: 8px 0 0;
  color: var(--ink-muted);
  font-size: 0.95rem;
  line-height: 1.35;
}

.habit-card.overdue p {
  color: #783327;
  font-weight: 700;
}

.habit-meta {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  margin-top: 12px;
}

.habit-meta span {
  min-height: 28px;
  padding: 5px 8px;
  border-radius: 7px;
  color: #574f46;
  background: #f1e8dc;
  font-size: 0.78rem;
  font-weight: 800;
}

.complete-button {
  display: grid;
  place-items: center;
  min-width: 54px;
  min-height: 100%;
  border: 0;
  border-radius: 8px;
  color: white;
  background: #211f1c;
}

.habit-card.done .complete-button {
  background: var(--green);
}

.complete-button:disabled {
  color: #918a80;
  background: #e2d8cb;
}

.primary-action,
.secondary-action {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 9px;
  min-height: 52px;
  width: 100%;
  border: 0;
  border-radius: 8px;
  padding: 0 16px;
  font-weight: 850;
}

.primary-action {
  color: white;
  background: #211f1c;
}

.secondary-action {
  color: #211f1c;
  border: 1px solid var(--border);
  background: #fffaf0;
}

.primary-action.compact,
.secondary-action.compact {
  width: auto;
  min-height: 44px;
  white-space: nowrap;
}

.notice,
.form-error,
.panel-message {
  margin: 0;
  padding: 10px 12px;
  border-radius: 8px;
  color: #783327;
  background: #ffe8df;
  font-size: 0.92rem;
  line-height: 1.32;
}

.auth-screen {
  display: grid;
  align-content: start;
  gap: 24px;
  padding: max(36px, env(safe-area-inset-top)) 18px max(28px, env(safe-area-inset-bottom));
}

.brand-block {
  display: grid;
  gap: 18px;
  padding-top: 26px;
}

.app-mark {
  display: grid;
  place-items: center;
  width: 64px;
  height: 64px;
  border-radius: 8px;
  color: white;
  background:
    linear-gradient(135deg, #ef6f56 0 54%, #2f8f83 55% 100%);
  font-size: 2rem;
  font-weight: 950;
  box-shadow: var(--shadow);
}

.auth-form,
.habit-form,
.settings-list,
.status-panel {
  display: grid;
  gap: 14px;
  padding: 16px;
  border: 1px solid var(--border);
  border-radius: 8px;
  background: var(--surface-strong);
}

.auth-form label,
.habit-form label {
  display: grid;
  gap: 7px;
  color: #5f574d;
  font-size: 0.84rem;
  font-weight: 850;
}

input,
select {
  width: 100%;
  min-height: 48px;
  border: 1px solid #d7cab9;
  border-radius: 8px;
  padding: 0 12px;
  color: #211f1c;
  background: #fffaf0;
}

input:focus,
select:focus,
button:focus-visible {
  outline: 3px solid rgb(62 111 182 / 28%);
  outline-offset: 2px;
}

.segmented {
  display: grid;
  grid-auto-flow: column;
  grid-auto-columns: 1fr;
  gap: 4px;
  padding: 4px;
  border-radius: 8px;
  background: #eee3d5;
}

.segmented button {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 7px;
  min-height: 42px;
  border: 0;
  border-radius: 7px;
  color: #5b5248;
  background: transparent;
  font-weight: 850;
}

.segmented button.active {
  color: #211f1c;
  background: #fffaf0;
  box-shadow: 0 4px 14px rgb(47 40 32 / 11%);
}

fieldset {
  min-width: 0;
  margin: 0;
  padding: 0;
  border: 0;
}

legend {
  margin-bottom: 8px;
  color: #5f574d;
  font-size: 0.84rem;
  font-weight: 850;
}

.field-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
}

.day-picker,
.choice-row {
  display: flex;
  gap: 8px;
  overflow-x: auto;
  padding-bottom: 2px;
}

.day-picker button,
.icon-choice,
.color-swatch {
  flex: 0 0 auto;
  min-width: 44px;
  min-height: 44px;
  border: 1px solid var(--border);
  border-radius: 8px;
  color: #574f46;
  background: #fffaf0;
  font-weight: 850;
}

.day-picker button.active,
.icon-choice.active {
  color: white;
  border-color: #211f1c;
  background: #211f1c;
}

.color-swatch {
  --swatch-color: #ef6f56;
  position: relative;
  width: 44px;
  padding: 0;
  background: var(--swatch-color);
}

.color-swatch.active::after {
  position: absolute;
  inset: 12px;
  border: 3px solid white;
  border-radius: 999px;
  content: "";
}

.stats-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 10px;
}

.stats-grid article {
  min-height: 104px;
  padding: 14px;
  border: 1px solid var(--border);
  border-radius: 8px;
  background: var(--surface-strong);
}

.stats-grid span {
  display: block;
  font-size: 2rem;
  font-weight: 950;
  line-height: 1;
}

.stats-grid p {
  margin: 8px 0 0;
  color: var(--ink-muted);
  font-weight: 800;
}

.status-panel {
  grid-template-columns: 44px 1fr auto;
  align-items: center;
}

.status-icon {
  display: grid;
  place-items: center;
  width: 44px;
  height: 44px;
  border-radius: 8px;
  color: white;
  background: var(--blue);
}

.settings-list {
  gap: 0;
  padding: 0;
  overflow: hidden;
}

.settings-list div {
  display: grid;
  gap: 4px;
  padding: 14px 16px;
  border-bottom: 1px solid var(--border);
}

.settings-list div:last-child {
  border-bottom: 0;
}

.settings-list span {
  color: var(--ink-muted);
  font-size: 0.82rem;
  font-weight: 800;
}

.bottom-nav {
  position: fixed;
  right: 0;
  bottom: 0;
  left: 0;
  z-index: 20;
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 4px;
  width: min(520px, 100%);
  margin: 0 auto;
  padding: 8px 10px max(8px, env(safe-area-inset-bottom));
  border-top: 1px solid rgb(222 212 198 / 86%);
  background: rgb(255 250 240 / 92%);
  backdrop-filter: blur(18px);
}

.bottom-nav button {
  display: grid;
  place-items: center;
  gap: 3px;
  min-height: 58px;
  border: 0;
  border-radius: 8px;
  color: #766d62;
  background: transparent;
  font-size: 0.72rem;
  font-weight: 850;
}

.bottom-nav button.active {
  color: #211f1c;
  background: #efe4d6;
}

.mock-index {
  display: grid;
  align-content: start;
  gap: 14px;
  padding: max(36px, env(safe-area-inset-top)) 18px max(28px, env(safe-area-inset-bottom));
}

.mock-index a {
  display: flex;
  align-items: center;
  justify-content: space-between;
  min-height: 56px;
  padding: 0 14px;
  border: 1px solid var(--border);
  border-radius: 8px;
  color: #211f1c;
  background: var(--surface-strong);
  font-weight: 850;
  text-decoration: none;
}

.bottom-nav a {
  display: grid;
  place-items: center;
  gap: 3px;
  min-height: 58px;
  border: 0;
  border-radius: 8px;
  color: #766d62;
  background: transparent;
  font-size: 0.72rem;
  font-weight: 850;
  text-decoration: none;
}

.bottom-nav a.active {
  color: #211f1c;
  background: #efe4d6;
}

.mock-link-reset {
  color: inherit;
  text-decoration: none;
}

.loading-screen {
  display: grid;
  place-items: center;
}

@media (max-width: 370px) {
  .field-grid,
  .status-panel {
    grid-template-columns: 1fr;
  }

  .top-bar h1,
  .brand-block h1 {
    font-size: 2rem;
  }

  .today-hero {
    align-items: flex-start;
    flex-direction: column;
  }
}

    </style>
    <title>Gkals Mocks</title>
  </head>
  <body>
    <main class="auth-screen mock-index">
      <section class="brand-block">
        <div class="app-mark">G</div>
        <div>
          <p class="eyebrow">Gkals</p>
          <h1>Mocks</h1>
        </div>
      </section>
      <a href="./auth.html">Acceso <span>Crear cuenta</span></a>
      <a href="./today.html">Hoy <span>Vista principal</span></a>
      <a href="./habits.html">Habitos <span>Listado</span></a>
      <a href="./create-habit.html">Crear habito <span>Formulario</span></a>
      <a href="./progress.html">Progreso <span>Metricas</span></a>
      <a href="./settings.html">Ajustes <span>Notificaciones</span></a>
    </main>
  </body>
</html>
